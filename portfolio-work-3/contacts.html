<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Контакты — Студия «Практик»</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700&family=Open+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="container">
      <a href="index.html" class="logo">Практик</a>
      <nav>
        <a href="index.html">Главная</a>
        <a href="services.html">Услуги</a>
        <a href="contacts.html">Контакты</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container">
        <h1>Контакты</h1>
        <p>Напишите нам — ответим в течение дня</p>
      </div>
    </section>

    <section class="form-section content">
      <div class="container">
        <form class="form-wrap" action="https://formspree.io/f/YOUR_FORMSPREE_ID" method="POST">
          <input type="hidden" name="_subject" value="Заявка с сайта Практик">
          <label for="name">Имя</label>
          <input type="text" id="name" name="name" placeholder="Ваше имя" required>
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="email@example.com" required>
          <label for="msg">Сообщение</label>
          <textarea id="msg" name="message" placeholder="Опишите задачу или вопрос"></textarea>
          <button type="submit">Отправить</button>
        </form>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>Студия «Практик» · Пример многостраничного сайта для портфолио</p>
    </div>
  </footer>
</body>
</html>
